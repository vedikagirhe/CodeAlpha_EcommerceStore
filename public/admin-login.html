<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | TechNest</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>TechNest Admin 🔐</h1>

    <nav>
        <a href="index.html">Back to Store</a>
    </nav>
</header>

<section class="auth-section">

    <div class="auth-box">

        <h2>Admin Login</h2>

        <form id="admin-login-form">

            <input
                type="text"
                id="admin-username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                id="admin-password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login as Admin
            </button>

        </form>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
